version: 2

updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tauri:
        patterns:
          - "@tauri-apps/*"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-build"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
